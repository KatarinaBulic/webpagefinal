<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiteHaven</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>BiteHaven</h1>
    </header>

    <section class="hero">

        <div class="hero-text">
            <h2>Welcome to Bite Haven</h2>
            <p>Order your favorite food quickly and easily.</p>

            <div class="buttons">
                <button class="btn-primary">Order Now</button>
                <button class="btn-secondary">Menu</button>
            </div>
        </div>

        <div class="hero-image">
            <img src="photo.png" alt="Food Image">
        </div>

    </section>

</body>
</html>
